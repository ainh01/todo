<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo List Online - Minimalist, Cloud Web Todo App</title>
    <meta
      name="keywords"
      content="online todo list, minimalist todo app, cloud saved todo, web todo list, todo manager, task scheduler, memo app, browser-based todo, instant access, secure storage, personal todo, professional todo, work and life assistant"
    />
    <meta
      name="description"
      content="uiineed's Todo List Online is a minimalist, web app that helps you manage your tasks and schedules effortlessly. Store your todos securely in the cloud, and enjoy a seamless experience without the hassle of missing the list. Perfect for both personal and professional use!"
    />
    <link type="favicon" rel="shortcut icon" href="public/img/favicon.png" />
    <link href="public/css/normalize.css" rel="stylesheet" media="screen" />
    <link href="public/css/style.min.css" rel="stylesheet" media="screen" />
    <style>
      .vip-processing {
        position: absolute;
        top: 100%;
        left: 0;
        right: 0;
        background: #f8f9ff;
        border: 2px solid #4f46e5;
        border-radius: 6px;
        padding: 12px;
        margin-top: 4px;
        display: flex;
        align-items: center;
        gap: 12px;
        z-index: 10;
      }

      .loading-spinner {
        width: 20px;
        height: 20px;
        border: 2px solid #e5e7eb;
        border-top: 2px solid #4f46e5;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        flex-shrink: 0;
      }

      .processing-text {
        color: #4f46e5;
        font-weight: 500;
        font-size: 14px;
      }

      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }

      .add-content:disabled {
        background-color: #f3f4f6;
        cursor: not-allowed;
        opacity: 0.6;
      }

      .submit-btn:disabled {
        background-color: #d1d5db;
        cursor: not-allowed;
        opacity: 0.6;
      }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vue@2.7.16/dist/vue.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css" integrity="sha384-GvrOXuhMATgEsSwCs4smul74iXGOixntILdUW9XmUC6+HX0sLNAK3q71HotJqlAn" crossorigin="anonymous">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js" integrity="sha384-cpW21h6RZv/phavutF+AuVYrr+dA8xD9zs6FwLpaCct6O9ctzYFfFr4dgmgccOTx" crossorigin="anonymous"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js" integrity="sha384-+VBxd3r6XgURycqtZ117nYw44OOcIax56Z4dCRWbxyPt0Koah1uHoK0o4+/RRE05" crossorigin="anonymous"></script>
  </head>

  <body>
    <div class="bg-pattern"></div>
    <div class="todo-wrapper">
      <div id="todo-app" class="todo-app"></div>
    </div>
    <script type="module" src="public/js/config.js"></script>
    <script type="module" src="public/js/modules/apiService.js"></script>
    <script type="module" src="public/js/modules/dialogUtils.js"></script>
    <script type="module" src="public/js/modules/todoStorage.js"></script>
    <script type="module" src="public/js/modules/fileHandlers.js"></script>
    <script type="module" src="public/js/components/TodoApp.js"></script>
    <script type="module" src="public/js/main.js"></script>
  </body>
</html>
