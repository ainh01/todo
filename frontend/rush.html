<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RUSH Mode - Focused Productivity Session</title>
    <meta
      name="keywords"
      content="rush mode, focused work session, productivity timer, gamified todo, time pressure tasks"
    />
    <meta
      name="description"
      content="RUSH mode transforms your todo experience into a focused, time-pressured productivity session designed to overcome procrastination through gamification."
    />
    <link type="favicon" rel="shortcut icon" href="public/img/favicon.png" />
    <link href="public/css/normalize.css" rel="stylesheet" media="screen" />
    <link href="public/css/style.min.css" rel="stylesheet" media="screen" />
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
    <script src="public/js/vue.js"></script>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css"
      integrity="sha384-GvrOXuhMATgEsSwCs4smul74iXGOixntILdUW9XmUC6+HX0sLNAK3q71HotJqlAn"
      crossorigin="anonymous"
    />
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"
      integrity="sha384-cpW21h6RZv/phavutF+AuVYrr+dA8xD9zs6FwLpaCct6O9ctzYFfFr4dgmgccOTx"
      crossorigin="anonymous"
    ></script>
    <style>
      @font-face {
        font-family: "Achievement";
        src: url("/public/font/achievement.otf") format("opentype");
        font-weight: normal;
        font-style: normal;
      }

      .special-text {
        font-family: "Achievement", sans-serif;
      }

      :root {
        --rush-red: #dc2626;
        --rush-red-light: #fef2f2;
        --rush-red-dark: #991b1b;
        --rush-green: #38b000;
        --rush-orange: #ea580c;
      }

      .rush-mode {
        background: linear-gradient(
          135deg,
          var(--rush-red-light),
          var(--body-bg)
        );
      }

      .timer-display {
        font-family: "Courier New", monospace;
        font-weight: bold;
        font-size: 18px;
        padding: 8px 16px;
        border: 2px solid var(--rush-red);
        border-radius: var(--border-radius);
        background: white;
        color: var(--rush-red);
        text-align: center;
        min-width: 100px;
        opacity: 0.74;
      }

      .timer-negative {
        background: var(--rush-red);
        color: white;
        animation: pulse 1s infinite;
      }

      .timer-completion {
        font-weight: bold;
        padding: 4px 8px;
        border-radius: 4px;
        font-size: 14px;
      }

      .timer-completion.completed {
        text-decoration: none !important;
      }

      .timer-early {
        background: var(--rush-green);
        color: white;
      }

      .timer-late {
        background: var(--rush-red);
        color: white;
      }

      .session-controls {
        display: flex;
        gap: 12px;
        margin: 16px 0;
        justify-content: center;
        align-items: center;
      }

      .rush-btn {
        margin-top: 10px;
        padding: 12px 24px;
        border: 2px solid var(--rush-red);
        border-radius: var(--border-radius);
        background: white;
        color: var(--rush-red);
        font-weight: bold;
        cursor: pointer;
        transition: all 0.3s;
      }

      .rush-btn:hover {
        background: var(--rush-red);
        color: white;
        transform: translate(-2px, -2px);
        box-shadow: 4px 4px 0px var(--rush-red-dark);
      }

      .rush-btn-primary {
        background: var(--rush-red);
        color: white;
      }

      .rush-btn-primary:hover {
        background: var(--rush-red-dark);
        box-shadow: 4px 4px 0px var(--black);
      }

      .hardness-input {
        width: 80px;
        margin-left: 8px;
        text-align: center;
      }

      .rating-modal {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0, 0, 0, 0.7);
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 10000;
      }

      .rating-content {
        background: white;
        padding: 32px;
        border-radius: var(--border-radius);
        border: var(--border);
        box-shadow: var(--box-shadow);
        text-align: center;
        max-width: 400px;
        width: 90%;
      }

      .rating-grade {
        font-size: 48px;
        font-weight: bold;
        margin: 16px 0;
        font-family: "Achievement", sans-serif;
      }

      .rating-sss {
        color: #ac5cf6;
      }
      .rating-ss {
        color: #f0f63b;
      }
      .rating-s {
        color: var(--rush-green);
      }
      .rating-a {
        color: var(--rush-orange);
      }
      .rating-f {
        color: var(--rush-red);
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.6;
        }
      }

      .rush-task-item {
        position: relative;
        cursor: grab;
      }

      .rush-task-item:active {
        cursor: grabbing;
      }

      .rush-task-item.active {
        border-color: var(--rush-red);
        box-shadow: 0 0 120px rgba(220, 38, 38, 0.83);
        position: relative;
        z-index: 999;
      }

      .rush-task-item.drag-over {
        border-top: 3px solid var(--rush-red);
      }

      .rush-task-item.completed {
        text-decoration: none !important;
      }

      .task-timer {
        position: absolute;
        top: 16px;
        right: 96px;
      }

      .task-allocated-timer {
        position: absolute;
        top: 35px;
        right: 50px;
        font-family: "Courier New", monospace;
        font-size: 14px;
        color: var(--rush-red);
        font-weight: bold;
        background: rgba(220, 38, 38, 0.1);
        padding: 4px 8px;
        border-radius: 4px;
      }

      .ttc-input {
        display: flex;
        align-items: center;
        gap: 12px;
        justify-content: center;
        margin: 16px 0;
      }

      .ttc-input input {
        width: 120px;
        text-align: center;
      }

      .task-edit-input {
        background: var(#d0f4f0);
        border: 2px solid var(--rush-red);
        padding: var(--padding);
        width: 100%;
        border-radius: var(--border-radius);
        font-size: 16px;
        outline: none;
      }

      .hl-edit-input {
        width: 60px;
        text-align: center;
        margin-left: 8px;
        padding: 4px;
        border: 1px solid var(--rush-red);
        border-radius: 4px;
      }

      .task-controls {
        position: absolute;
        top: 16px;
        right: 12px;
        display: flex;
        gap: 4px;
      }

      .task-control-btn {
        width: 24px;
        height: 24px;
        border: 1px solid var(--rush-red);
        border-radius: 4px;
        background: white;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 12px;
        color: var(--rush-red);
        transition: all 0.2s;
      }

      .task-control-btn:hover {
        background: var(--rush-red);
        color: white;
      }

      .todo-content.completed {
        text-decoration: none !important;
        opacity: 0.7;
      }

      .completed .timer-completion {
        text-decoration: none !important;
      }
      .timer-completion.completed.timer-early {
        text-decoration: none !important;
      }

      .countdown-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 78, 137, 0.482);
        z-index: 99999;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .demo {
        position: relative;
        width: 500px;
        height: 140px;
        padding: 10px;
        border-radius: 20px;
        font-family: Helvetica, Arial, sans-serif;
      }

      .demo__colored-blocks {
        overflow: hidden;
        position: absolute;
        left: 50%;
        top: 0;
        width: 500px;
        height: 100%;
        margin-left: -250px;
        padding: 10px;
        border-radius: 20px;
        perspective: 1000px;
        animation:
          demoAnim 6s ease-in-out 1 both,
          contAnim 6s 1 both;
      }

      .demo__colored-blocks-rotater {
        position: absolute;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        border-radius: inherit;
        animation: rotation 1.3s linear infinite;
      }

      .demo__colored-blocks-inner {
        overflow: hidden;
        position: relative;
        height: 100%;
        background: #800016;
        border-radius: inherit;
      }

      .demo__colored-block {
        position: absolute;
        left: 50%;
        top: 50%;
        width: 300%;
        height: 300%;
        transform-origin: 0 0;
      }

      .demo__colored-block:nth-child(1) {
        transform: rotate(0deg) skewX(30deg);
        background-color: #a0001c;
      }

      .demo__colored-block:nth-child(2) {
        transform: rotate(120deg) skewX(30deg);
        background-color: #c00021;
      }

      .demo__colored-block:nth-child(3) {
        transform: rotate(240deg) skewX(30deg);
        background-color: #ff002b;
      }

      .demo__inner {
        overflow: hidden;
        position: relative;
        width: 100%;
        height: 100%;
      }

      .demo__numbers {
        overflow: visible;
        position: absolute;
        left: 50%;
        top: 50%;
        width: 100px;
        height: 100px;
        margin-left: -50px;
        margin-top: -50px;
      }

      .demo__numbers-path {
        fill: none;
        stroke-width: 10px;
        stroke: #fff;
        stroke-linecap: round;
        stroke-linejoin: round;
        stroke-dasharray: 0, 518.055;
        stroke-dashoffset: 0;
        animation: numAnim 6s ease-in-out 1;
        opacity: 0;
      }

      .demo__text {
        position: absolute;
        left: 50%;
        top: 0;
        width: 500px;
        height: 100%;
        margin-left: -250px;
        text-align: center;
        line-height: 140px;
        font-size: 100px;
        color: #fff;
        text-transform: uppercase;
        letter-spacing: 15px;
        transform: translateX(10px);
        opacity: 0;
        animation: hideTextReady 6s 1;
      }

      .demo__text--go {
        animation: hideTextGo 6s 1;
      }

      @keyframes contAnim {
        0%,
        12% {
          margin-left: -250px;
          width: 500px;
        }
        18%,
        75% {
          margin-left: -70px;
          width: 140px;
        }
        80%,
        100% {
          margin-left: -250px;
          width: 500px;
        }
      }

      @keyframes numAnim {
        0%,
        15% {
          stroke-dasharray: 0, 518.055;
          stroke-dashoffset: 0;
          opacity: 0;
        }
        18%,
        33% {
          opacity: 1;
          stroke-dasharray: 144.426, 518.055;
          stroke-dashoffset: -40;
        }
        38%,
        53% {
          stroke-dasharray: 136.022, 518.055;
          stroke-dashoffset: -227.239;
        }
        58% {
          stroke-dasharray: 113.475, 518.055;
          stroke-dashoffset: -445.9;
        }
        63%,
        73% {
          stroke-dasharray: 72.155, 518.055;
          stroke-dashoffset: -445.9;
        }
        74% {
          opacity: 1;
        }
        78%,
        100% {
          opacity: 0;
        }
      }

      @keyframes rotation {
        to {
          transform: rotate(360deg);
        }
      }

      @keyframes demoAnim {
        0%,
        12% {
          border-radius: 20px;
          transform: rotate(0deg);
        }
        18%,
        33% {
          border-radius: 50%;
          transform: rotate(360deg);
        }
        38%,
        53% {
          border-radius: 0;
          transform: rotate(720deg);
        }
        58%,
        75% {
          border-radius: 50%;
          transform: rotate(1080deg);
        }
        80%,
        100% {
          border-radius: 20px;
          transform: rotate(1440deg);
        }
      }

      @keyframes hideTextReady {
        0% {
          opacity: 0;
        }
        3%,
        12% {
          opacity: 1;
        }
        16%,
        100% {
          opacity: 0;
        }
      }

      @keyframes hideTextGo {
        0%,
        76% {
          opacity: 0;
        }
        80%,
        100% {
          opacity: 1;
        }
      }
    </style>
  </head>

  <body class="rush-mode">
    <div class="bg-pattern"></div>
    <div class="todo-wrapper">
      <div id="rush-app" class="todo-app"></div>
    </div>

    <script type="module">
      import { ApiService } from "./public/js/modules/apiService.js";
      import { DialogUtils } from "./public/js/modules/dialogUtils.js";
      import { authGuard } from "./public/js/modules/authGuard.js";

      authGuard();

      const RushApp = {
        name: "RushApp",

        template: `  
          <div>  
            <div v-if="showCountdown" class="countdown-overlay">  
              <div class="demo">  
                <div class="demo__colored-blocks">  
                  <div class="demo__colored-blocks-rotater">  
                    <div class="demo__colored-block"></div>  
                    <div class="demo__colored-block"></div>  
                    <div class="demo__colored-block"></div>  
                  </div>  
                  <div class="demo__colored-blocks-inner"></div>  
                  <div class="demo__text">IT'S</div>  
                  <div class="demo__text demo__text--go">GO!</div>  
                </div>  
                <div class="demo__inner">  
                  <svg class="demo__numbers" viewBox="0 0 100 100">  
                    <defs>  
                      <path class="demo__num-path-1" d="M40,28 55,22 55,78"/>  
                      <path class="demo__num-join-1-2" d="M55,78 55,83 a17,17 0 1,0 34,0 a20,10 0 0,0 -20,-10"/>  
                      <path class="demo__num-path-2" d="M69,73 l-35,0 l30,-30 a16,16 0 0,0 -22.6,-22.6 l-7,7"/>  
                      <path class="demo__num-join-2-3" d="M28,69 Q25,44 34.4,27.4"/>  
                      <path class="demo__num-path-3" d="M30,20 60,20 40,50 a18,15 0 1,1 -12,19"/>  
                    </defs>  
                    <path class="demo__numbers-path"  
                          d="M-10,20 60,20 40,50 a18,15 0 1,1 -12,19  
                             Q25,44 34.4,27.4  
                             l7,-7 a16,16 0 0,1 22.6,22.6 l-30,30 l35,0 L69,73  
                             a20,10 0 0,1 20,10 a17,17 0 0,1 -34,0 L55,83  
                             l0,-61 L40,28" />  
                  </svg>  
                </div>  
              </div>  
            </div>  

            <div class="container header">  
              <div class="todo-input">  
                <h1 class="title" style="color: var(--rush-red);">  
                  🚀 RUSH MODE  
                </h1>  
                
                <div class="ttc-input">  
                  <label><strong>Total Time (minutes):</strong></label>  
                  <input   
                    type="number"   
                    v-model.number="totalTimeMinutes"  
                    :disabled="sessionActive"  
                    min="1"  
                    placeholder="60"  
                    @input="recalculateAllocatedTimes"  
                    autocomplete="off"  
                  />  
                </div>  
                
                <div class="add-content-wrapper">  
                  <input  
                    type="text"  
                    class="add-content"  
                    placeholder="Add a rush task..."  
                    v-model="newTaskTitle"  
                    @keyup.enter="addTask"  
                    :disabled="sessionActive"  
                    style="padding-right: 200px;"  
                    autocomplete="off"  
                  />  
                  
                  <label style="position: absolute; right: 130px; top: 60%; transform: translateY(-60%); font-weight: bold;">  
                    HL:  
                    <input  
                      type="number"  
                      v-model.number="newTaskHL"  
                      min="1"  
                      max="10"  
                      class="hardness-input"  
                      :disabled="sessionActive"  
                      autocomplete="off"  
                    />  
                  </label>  
                  
                  <button   
                    class="btn submit-btn"   
                    type="button"   
                    @click="addTask"  
                    :disabled="sessionActive"  
                    style="background: var(--rush-red);"  
                  >  
                    Add  
                  </button>  
                </div>  
              </div>  
            </div>  

            <div class="session-controls">  
              <button   
                class="rush-btn rush-btn-primary"  
                @click="toggleSession"  
                :disabled="tasks.length === 0"  
              >  
                {{ sessionActive ? 'PAUSE' : (sessionPaused ? 'RESUME' : 'START RUSH') }}  
              </button>  
              
              <button   
                class="rush-btn"  
                @click="endSession"  
                :disabled="!sessionActive && !sessionPaused"  
              >  
                End Session  
              </button>  
              
              <button   
                class="rush-btn"  
                @click="clearAll"  
                style="border-color: var(--rush-orange); color: var(--rush-orange);"  
              >  
                Clear All  
              </button>  
            </div>  

            <div class="container main">  
              <div class="todo-list-box">  
                <div class="bar-message" style="border-color: var(--rush-red);">  
                  <div class="bar-message-text" style="color: var(--rush-red); font-weight: bold;">  
                    {{ statusMessage }}  
                  </div>  
                </div>  

                <ul v-if="!tasks.length" class="empty-tips">  
                  <li>🚀 Add tasks with difficulty levels (HL) to start your RUSH session!</li>  
                  <li>⚡ Higher HL = More time allocated</li>  
                  <li>🎯 Beat the clock for better ratings!</li>  
                  <li>⏰ Time rolls over when you finish early</li>  
                  <li>✏️ Double-click task titles to edit, drag to reorder</li>  
                </ul>  

                <ul class="todo-list">  
                  <li   
                    v-for="(task, index) in tasks"   
                    :key="task.id"  
                    class="rush-task-item"  
                    :class="{   
                      active: currentTaskIndex === index && sessionActive,  
                      completed: task.completed,  
                      'drag-over': dragOverIndex === index  
                    }"  
                    draggable="true"  
                    :ref="'taskItem-' + task.id"
                    @dragstart="handleDragStart(index, $event)"  
                    @dragover="handleDragOver(index, $event)"  
                    @dragleave="handleDragLeave"  
                    @drop="handleDrop(index, $event)"  
                  >  
                    <div
                      v-if="editingTask === task.id"
                      class="todo-content"
                    >  
                      <input   
                        v-model="task.title"  
                        autocomplete="off"  
                        @keyup.enter="saveEdit(task)"  
                        @keyup.esc="cancelEdit"  
                        class="task-edit-input"  
                        ref="editInput"  
                      />  
                      <label style="margin-left: 16px; font-weight: bold;">  
                        HL:  
                        <input  
                          v-model.number="task.hl"  
                          type="number"  
                          min="1"  
                          max="10"  
                          class="hl-edit-input"  
                          @change="recalculateAllocatedTimes"  
                          autocomplete="off"  
                        />  
                      </label>  
                    </div>  
                    
                    <div v-else   
                        class="todo-content"   
                        :class="{ completed: task.completed }"  
                        @dblclick="startEdit(task)"  
                        >  
                      
                      <label :style="{ 'text-decoration': task.completed ? 'line-through' : 'none' }" v-html="renderTaskLabel(task)">  
                      </label>  
                      
                      <div v-if="task.completed"   
                          class="timer-completion completed"   
                          :class="{  
                            'timer-early': task.cumulativeTime > 0,  
                            'timer-late': task.cumulativeTime < 0  
                          }"  
                          style="width: 110px"  
                          >  
                        {{ task.cumulativeTime > 0 ? '-' : '+' }}  
                        {{ formatTime(Math.abs(task.cumulativeTime)) }}  
                      </div>  
                    </div>  

                    <div   
                      v-if="!sessionActive && !task.completed"  
                      class="task-allocated-timer"  
                    >  
                      {{ formatTime(task.allocatedTime * 1000) }}  
                    </div>  
                    
                    <div   
                      v-if="currentTaskIndex === index && sessionActive"  
                      class="timer-display task-timer"  
                      :class="{ 'timer-negative': currentTaskTimeLeft < 0 }"  
                    >  
                      {{ formatTime(currentTaskTimeLeft) }}  
                    </div>  

                    <div  
                      class="todo-btn btn-copy"  
                      v-if="hasHiddenPrompt(task) && editingTask !== task.id && (sessionActive || sessionPaused)"  
                      @click="copyPromptContent(task, $event)"  
                      title="Copy hidden prompt"  
                    >  
                      <img src="public/img/copy.svg" alt="Copy Prompt" draggable="false" />  
                    </div>  

                    <div class="task-controls">   
                      <div class="todo-btn btn-delete" style="position:sticky"  title="Remove task" @click="removeTask(index)" v-if="!sessionActive && !sessionPaused" >   
                      <img src="public/img/delete.svg" alt="Delete" draggable="false">  
                      </div>   
                    </div>  
                    
                    <div  
                      class="todo-btn btn-finish"  
                      v-if="!task.completed && (sessionActive || sessionPaused)"  
                      @click="completeTask(index)"  
                    ></div>  
                    
                    <div  
                      class="todo-btn btn-unfinish"  
                      v-if="task.completed && (sessionActive || sessionPaused)"  
                      @click="uncompleteTask(index)"  
                    >  
                      <img src="public/img/complete.svg" alt="Completed" />  
                    </div>  
                  </li>  
                </ul>  
              </div>  
            </div>  

            <div v-if="showRatingModal" class="rating-modal" @click="closeRatingModal">  
              <div class="rating-content" @click.stop>  
                <h2>Session Complete!</h2>  
                <div class="rating-grade" :class="'rating-' + finalRating.toLowerCase()">  
                  {{ finalRating }}  
                </div>  
                <p><strong>Actual Time:</strong> {{ formatTime(actualCompletionTime) }}</p>  
                <p><strong>Target Time:</strong> {{ formatTime(totalTimeSeconds * 1000) }}</p>  
                <p><strong>Tasks Completed:</strong> {{ completedTasksCount }} / {{ totalTasksCount }}</p>  
                <button class="rush-btn rush-btn-primary" @click="closeRatingModal">  
                  Close  
                </button>  
              </div>  
            </div>  

            <div class="nav">  
              <span>{{ userEmail }}</span>  
              <button class="rush-btn" @click="goBack" style="margin-left: 12px;">  
                ← Back to Todo  
              </button>  
            </div>  
          </div>  
        `,

        data() {
          return {
            showCountdown: false,
            tasks: [],
            newTaskTitle: "",
            newTaskHL: 1,
            totalTimeMinutes: 60,
            sessionActive: false,
            importSuccessMessage: "",
            sessionPaused: false,
            sessionStartTime: null,
            pausedTime: 0,
            currentTaskIndex: 0,
            currentTaskStartTime: null,
            currentTaskTimeLeft: 0,
            intervalId: null,
            showRatingModal: false,
            finalRating: "",
            actualCompletionTime: 0,
            userEmail: localStorage.getItem("user_email") || "",
            editingTask: null,
            originalTaskData: null,
            draggedIndex: null,
            dragOverIndex: null,
            sound: new Audio("/public/sound/confetti.mp3"),
            confettiColors: [
              "#a864fd",
              "#29cdff",
              "#78ff44",
              "#ff718d",
              "#fdff6a",
            ],
          };
        },

        async mounted() {
          await this.loadImportedTasks();
          document.addEventListener('mousedown', this.handleClickOutside);
        },

        beforeDestroy() {
          document.removeEventListener('mousedown', this.handleClickOutside);
          this.stopTimer();
        },

        computed: {
          totalTimeSeconds() {
            return this.totalTimeMinutes * 60;
          },

          totalHL() {
            return this.tasks.reduce((sum, task) => sum + task.hl, 0);
          },

          getCumulativeTimeAtTask() {
            return (taskIndex) => {
              let cumulativeTime = 0;
              for (let i = 0; i <= taskIndex; i++) {
                const task = this.tasks[i];
                if (task.completed) {
                  const taskSavings =
                    task.allocatedTime * 1000 - task.actualTime;
                  cumulativeTime += taskSavings;
                }
              }
              return cumulativeTime;
            };
          },

          statusMessage() {
            if (this.importSuccessMessage) {
              return this.importSuccessMessage;
            }
            if (this.sessionActive) {
              const current = this.tasks[this.currentTaskIndex];
              return current
                ? `Working on: ${current.title}`
                : "All tasks completed!";
            } else if (this.sessionPaused) {
              return "Session paused - Click RESUME to continue";
            } else if (this.tasks.length === 0) {
              return "Add tasks to start your RUSH session";
            } else {
              const totalAllocated = this.tasks.reduce(
                (sum, t) => sum + t.allocatedTime,
                0,
              );
              return `${this.tasks.length} tasks ready (${this.formatTime(totalAllocated * 1000)} total) - Click START RUSH to begin`;
            }
          },

          completedTasksCount() {
            return this.tasks.filter((t) => t.completed).length;
          },

          totalTasksCount() {
            return this.tasks.length;
          },
        },

        methods: {
          runCountdownThenStart() {
            this.showCountdown = true;
            setTimeout(() => {
              this.showCountdown = false;
              this.startSession();
            }, 6000);
          },

          addTask() {
            if (!this.newTaskTitle.trim()) return;

            const task = {
              id: Date.now(),
              title: this.newTaskTitle.trim(),
              hl: this.newTaskHL,
              completed: false,
              allocatedTime: 0,
              actualTime: 0,
              startTime: null,
              deadline: 0,
            };

            this.tasks.push(task);
            this.recalculateAllocatedTimes();

            this.newTaskTitle = "";
            this.newTaskHL = 1;
          },

          recalculateAllocatedTimes() {
            const totalHL = this.totalHL;
            if (totalHL === 0) return;

            let remainingTime = this.totalTimeSeconds;
            const timePerHL = this.totalTimeSeconds / totalHL;

            for (let i = 0; i < this.tasks.length - 1; i++) {
              const task = this.tasks[i];
              task.allocatedTime = Math.floor(timePerHL * task.hl);
              remainingTime -= task.allocatedTime;
            }
            if (this.tasks.length > 0) {
              this.tasks[this.tasks.length - 1].allocatedTime = Math.max(
                0,
                remainingTime,
              );
            }

            let cumulativeTime = 0;
            for (let i = 0; i < this.tasks.length; i++) {
              cumulativeTime += this.tasks[i].allocatedTime;
              this.tasks[i].deadline = cumulativeTime * 1000;
            }
          },

          removeTask(index) {
            this.tasks.splice(index, 1);
            this.recalculateAllocatedTimes();

            if (index <= this.currentTaskIndex && this.currentTaskIndex > 0) {
              this.currentTaskIndex--;
            }
          },

          startEdit(task) {
            this.editingTask = task.id;
            this.originalTaskData = {
              title: task.title,
              hl: task.hl,
            };

            this.$nextTick(() => {
              const input = this.$refs.editInput && this.$refs.editInput[0];
              if (input) {
                input.focus();
                input.select();
              }
            });
          },

          saveEdit(task) {
            this.editingTask = null;
            this.originalTaskData = null;
            this.recalculateAllocatedTimes();
          },

          handleClickOutside(event) {
            if (!this.editingTask) return;

            const taskEl = this.$refs['taskItem-' + this.editingTask];
            const el = taskEl && (Array.isArray(taskEl) ? taskEl[0]?.$el || taskEl[0] : taskEl.$el || taskEl);
            if (el && el.contains(event.target)) return;

            const task = this.tasks.find((t) => t.id === this.editingTask);
            if (task) this.saveEdit(task);
          },

          cancelEdit() {
            if (this.editingTask && this.originalTaskData) {
              const task = this.tasks.find((t) => t.id === this.editingTask);
              if (task) {
                task.title = this.originalTaskData.title;
                task.hl = this.originalTaskData.hl;
              }
            }
            this.editingTask = null;
            this.originalTaskData = null;
            this.recalculateAllocatedTimes();
          },

          handleDragStart(index, event) {
            this.draggedIndex = index;
            event.dataTransfer.setData("text/plain", index.toString());
            event.dataTransfer.effectAllowed = "move";
          },

          handleDragOver(index, event) {
            event.preventDefault();
            event.dataTransfer.dropEffect = "move";
            this.dragOverIndex = index;
          },

          handleDragLeave() {
            this.dragOverIndex = null;
          },

          handleDrop(index, event) {
            event.preventDefault();
            this.dragOverIndex = null;

            if (this.draggedIndex !== null && this.draggedIndex !== index) {
              const draggedTask = this.tasks.splice(this.draggedIndex, 1)[0];
              this.tasks.splice(index, 0, draggedTask);

              if (this.currentTaskIndex === this.draggedIndex) {
                this.currentTaskIndex = index;
              } else if (
                this.draggedIndex < this.currentTaskIndex &&
                index >= this.currentTaskIndex
              ) {
                this.currentTaskIndex--;
              } else if (
                this.draggedIndex > this.currentTaskIndex &&
                index <= this.currentTaskIndex
              ) {
                this.currentTaskIndex++;
              }
            }

            this.draggedIndex = null;
          },

          async loadImportedTasks() {
            try {
              const importedData = localStorage.getItem("rush-imported-tasks");
              if (importedData) {
                const importedTasks = JSON.parse(importedData);
                if (Array.isArray(importedTasks) && importedTasks.length > 0) {
                  this.tasks = importedTasks;
                  this.recalculateAllocatedTimes();
                  this.importSuccessMessage = `Successfully imported ${importedTasks.length} task(s) from your todo list!`;

                  localStorage.removeItem("rush-imported-tasks");

                  setTimeout(() => {
                    this.importSuccessMessage = "";
                  }, 5000);
                }
              }
            } catch (error) {
              console.error("Failed to load imported tasks:", error);
            }
          },

          hasHiddenPrompt(task) {
            return (
              task.title.includes("fPrompt[") &&
              task.title.includes("fPromptEnd]")
            );
          },

          getHiddenPromptContent(task) {
            const promptPattern = /fPrompt\[(.*?)fPromptEnd\]/gs;
            const matches = [...task.title.matchAll(promptPattern)];
            return matches.map((match) => match[1]).join("\n\n");
          },

          async copyPromptContent(task, event) {
            if (!this.hasHiddenPrompt(task)) return;

            const content = this.getHiddenPromptContent(task);
            try {
              if (navigator.clipboard && window.isSecureContext) {
                await navigator.clipboard.writeText(content);
              } else {
                const textArea = document.createElement("textarea");
                textArea.value = content;
                textArea.style.position = "fixed";
                textArea.style.left = "-999999px";
                textArea.style.top = "-999999px";
                document.body.appendChild(textArea);
                textArea.focus();
                textArea.select();
                document.execCommand("copy");
                textArea.remove();
              }
              this.showCopyFeedback(event);
            } catch (error) {
              console.error("Copy failed:", error);
            }
          },

          showCopyFeedback(event) {
            const copyBtn = event && event.currentTarget;
            if (copyBtn) {
              const originalTitle = copyBtn.title;
              copyBtn.title = "Copied!";
              copyBtn.style.background = "#16a34a";
              copyBtn.style.borderColor = "#16a34a";
              setTimeout(() => {
                copyBtn.title = originalTitle;
                copyBtn.style.background = "";
                copyBtn.style.borderColor = "";
              }, 1500);
            }
          },

          renderTaskLabel(task) {
            const displayTitle = this.parseHiddenPrompts(
              this.renderMath(task.title),
            );
            return `${displayTitle} (HL: ${task.hl})`;
          },

          parseHiddenPrompts(content) {
            const promptPattern = /fPrompt\[(.*?)fPromptEnd\]/gs;
            return content.replace(promptPattern, "").trim();
          },

          renderMath(content) {
            if (typeof katex !== "undefined") {
              try {
                content = content.replace(
                  /\$\$([^$]+)\$\$/g,
                  (match, mathContent) => {
                    try {
                      return katex.renderToString(mathContent.trim(), {
                        displayMode: true,
                        throwOnError: false,
                        strict: false,
                      });
                    } catch (e) {
                      console.warn("KaTeX display math error:", e);
                      return match;
                    }
                  },
                );

                content = content.replace(
                  /\$([^$]+)\$/g,
                  (match, mathContent) => {
                    try {
                      return katex.renderToString(mathContent.trim(), {
                        displayMode: false,
                        throwOnError: false,
                        strict: false,
                      });
                    } catch (e) {
                      console.warn("KaTeX inline math error:", e);
                      return match;
                    }
                  },
                );
              } catch (error) {
                console.error("KaTeX rendering error:", error);
              }
            }
            return content;
          },

          celebrateCompletion() {
            try {
              this.sound.currentTime = 0;
              this.sound
                .play()
                .catch((e) => console.log("Sound play failed:", e));
            } catch (e) {
              console.log("Sound initialization failed:", e);
            }

            if (typeof confetti !== "undefined") {
              confetti({
                particleCount: 350,
                startVelocity: 88,
                drift: 0.3,
                angle: 45,
                spread: 70,
                origin: { x: 0.0, y: 1.0 },
                colors: this.confettiColors,
              });
              confetti({
                particleCount: 350,
                startVelocity: 88,
                drift: 0.3,
                angle: 135,
                spread: 70,
                origin: { x: 1.0, y: 1.0 },
                colors: this.confettiColors,
              });
            }
          },

          toggleSession() {
            if (!this.sessionActive && !this.sessionPaused) {
              this.runCountdownThenStart();
            } else if (this.sessionActive) {
              this.pauseSession();
            } else if (this.sessionPaused) {
              this.resumeSession();
            }
          },

          startSession() {
            this.recalculateAllocatedTimes();
            this.sessionActive = true;
            this.sessionPaused = false;
            this.sessionStartTime = Date.now();
            this.currentTaskIndex = this.findNextIncompleteTask();

            if (this.currentTaskIndex !== -1) {
              this.startCurrentTask();
              this.startTimer();
            } else {
              this.endSession();
            }
          },

          pauseSession() {
            this.sessionActive = false;
            this.sessionPaused = true;
            this.pausedTime += Date.now() - this.sessionStartTime;
            this.stopTimer();
          },

          resumeSession() {
            this.sessionActive = true;
            this.sessionPaused = false;
            this.sessionStartTime = Date.now();
            this.startTimer();
          },

          endSession() {
            this.sessionActive = false;
            this.sessionPaused = false;
            this.stopTimer();

            this.actualCompletionTime =
              this.pausedTime +
              (Date.now() - (this.sessionStartTime || Date.now()));
            this.calculateFinalRating();
            this.showRatingModal = true;

            this.resetSession();
          },

          resetSession() {
            this.currentTaskIndex = 0;
            this.pausedTime = 0;
            this.sessionStartTime = null;
            this.currentTaskStartTime = null;
          },

          findNextIncompleteTask() {
            for (let i = 0; i < this.tasks.length; i++) {
              if (!this.tasks[i].completed) {
                return i;
              }
            }
            return -1;
          },

          startCurrentTask() {
            if (
              this.currentTaskIndex >= 0 &&
              this.currentTaskIndex < this.tasks.length
            ) {
              const task = this.tasks[this.currentTaskIndex];
              task.startTime = Date.now();

              const sessionElapsed =
                this.pausedTime + (Date.now() - this.sessionStartTime);
              this.currentTaskTimeLeft = task.deadline - sessionElapsed;
            }
          },

          startTimer() {
            this.intervalId = setInterval(() => {
              if (
                this.currentTaskIndex >= 0 &&
                this.currentTaskIndex < this.tasks.length
              ) {
                const task = this.tasks[this.currentTaskIndex];
                const sessionElapsed =
                  this.pausedTime + (Date.now() - this.sessionStartTime);
                this.currentTaskTimeLeft = task.deadline - sessionElapsed;
              }
            }, 10);
          },

          stopTimer() {
            if (this.intervalId) {
              clearInterval(this.intervalId);
              this.intervalId = null;
            }
          },

          completeTask(index) {
            if (!this.sessionActive) return;

            const task = this.tasks[index];
            if (task.completed) return;

            task.completed = true;
            task.actualTime = task.startTime ? Date.now() - task.startTime : 0;

            const sessionElapsed =
              this.pausedTime + (Date.now() - this.sessionStartTime);
            task.cumulativeTime = task.deadline - sessionElapsed;

            this.celebrateCompletion();

            this.currentTaskIndex = this.findNextIncompleteTask();

            if (this.currentTaskIndex !== -1 && this.sessionActive) {
              this.startCurrentTask();
            } else {
              this.endSession();
            }
          },

          uncompleteTask(index) {
            const task = this.tasks[index];
            task.completed = false;
            task.actualTime = 0;
            task.startTime = null;

            if (index < this.currentTaskIndex) {
              this.currentTaskIndex = index;
              if (this.sessionActive) {
                this.startCurrentTask();
              }
            }
          },

          calculateFinalRating() {
            const completionRatio =
              this.actualCompletionTime / (this.totalTimeSeconds * 1000);

            if (
              !this.sessionActive &&
              !this.sessionPaused &&
              this.completedTasksCount < this.totalTasksCount
            ) {
              this.finalRating = "F";
            } else if (completionRatio <= 0.6) {
              this.finalRating = "SSS";
            } else if (completionRatio <= 0.8) {
              this.finalRating = "SS";
            } else if (completionRatio < 1.0) {
              this.finalRating = "S";
            } else {
              this.finalRating = "A";
            }
          },

          clearAll() {
            if (this.sessionActive || this.sessionPaused) {
              DialogUtils.confirm(
                "This will end your current session. Continue?",
              ).then((confirmed) => {
                if (confirmed) {
                  this.endSession();
                  this.tasks = [];
                }
              });
            } else {
              this.tasks = [];
            }
          },

          formatTime(milliseconds) {
            const totalMs = Math.abs(Math.floor(milliseconds || 0));
            const hrs = Math.floor(totalMs / 3600000);
            const mins = Math.floor((totalMs % 3600000) / 60000);
            const secs = Math.floor((totalMs % 60000) / 1000);
            const cs = Math.floor((totalMs % 1000) / 10);
            if (hrs > 0) {
              return `${hrs}:${mins.toString().padStart(2, "0")}:${secs.toString().padStart(2, "0")}:${cs.toString().padStart(2, "0")}`;
            } else if (mins > 0) {
              return `${mins}:${secs.toString().padStart(2, "0")}:${cs.toString().padStart(2, "0")}`;
            } else {
              return `${secs}:${cs.toString().padStart(2, "0")}`;
            }
          },

          closeRatingModal() {
            this.showRatingModal = false;
          },

          goBack() {
            window.location.href = "index.html";
          },
        },
      };

      const app = new Vue({
        el: "#rush-app",
        render: (h) => h(RushApp),
      });
    </script>
  </body>
